<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Ladders Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .settings {
            margin-bottom: 20px;
        }

        .setting-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .setting-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .setting-group input, .setting-group select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 16px;
        }

        .setting-group input[type="number"] {
            width: 90px;
        }

        .phase-indicator {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .phase-work {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
        }

        .phase-rest {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }

        .phase-setup {
            background: linear-gradient(135deg, #feca57, #ff9ff3);
            color: white;
        }

        .rep-count {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }

        .timer-display {
            font-size: 36px;
            font-weight: bold;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: center;
            margin: 20px 0;
        }

        .btn-complete {
            display: block;
            width: 100%;
            padding: 22px 25px;
            font-size: 22px;
            min-height: 64px;
            margin-top: 25px;
        }

        .secondary-controls {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 120px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
        }

        .btn-start {
            display: block;
            width: 100%;
            padding: 22px 25px;
            font-size: 22px;
            min-height: 64px;
            margin-top: 25px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .total-time {
            font-size: 18px;
            margin: 10px 0;
            opacity: 0.9;
        }

        .rep-counter {
            font-size: 16px;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            opacity: 0.9;
        }

        .workout-summary {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .summary-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #4ecdc4;
        }

        .summary-stat {
            font-size: 18px;
            margin: 8px 0;
        }

        .total-reps-highlight {
            font-size: 32px;
            font-weight: bold;
            color: #ff6b6b;
            margin: 15px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .audio-controls {
            margin: 15px 0;
            text-align: left;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .hidden {
            display: none !important;
        }

        .btn-complete-inactive {
            visibility: hidden;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            .phase-indicator {
                font-size: 36px;
                padding: 15px;
            }
            
            .rep-count {
                font-size: 56px;
            }
            
            .timer-display {
                font-size: 28px;
            }
            
            .btn {
                min-width: 100px;
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Workout Ladders Timer</h1>
        
        <div id="setupScreen" class="settings">
            <div class="setting-group">
                <label for="workoutDuration">Total Workout Time (minutes):</label>
                <input type="number" id="workoutDuration" value="5" min="1" max="60" inputmode="numeric" pattern="[0-9]*">
            </div>
            
            <div class="audio-controls">
                <div class="checkbox-group">
                    <input type="checkbox" id="phaseTransitions" checked>
                    <label for="phaseTransitions">Phase transition sounds</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="workoutComplete" checked>
                    <label for="workoutComplete">Workout completion sound</label>
                </div>
            </div>
            
            <button class="btn btn-primary btn-start" onclick="startWorkout()">Start Workout</button>
        </div>

        <div id="workoutScreen" class="hidden">
            <div id="phaseIndicator" class="phase-indicator phase-setup">
                GET READY
            </div>
            
            <div id="repCount" class="rep-count">1</div>
            
            <div id="timerDisplay" class="timer-display">0:00</div>
            
            <div class="total-time">
                Total Time Remaining: <span id="totalTimeRemaining">5:00</span>
            </div>
            
            <div class="rep-counter">
                <div>Current Set: <span id="currentReps">0</span> reps</div>
                <div>Total Completed: <span id="totalRepsCompleted">0</span> reps</div>
            </div>
            
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
            
            <div class="controls">
                <div id="normalControls" class="secondary-controls">
                    <button id="pauseBtn" class="btn btn-warning" onclick="togglePause()">Pause</button>
                    <button id="stopBtn" class="btn btn-danger" onclick="confirmStop()">Stop</button>
                </div>
                <div id="stopConfirmControls" class="secondary-controls hidden">
                    <button class="btn btn-danger" onclick="stopWorkout()">Yes, Stop</button>
                    <button class="btn btn-warning" onclick="cancelStop()">Cancel</button>
                </div>
                <button id="completeBtn" class="btn btn-success btn-complete btn-complete-inactive" onclick="completeReps()">Complete Reps</button>
            </div>
        </div>
    </div>

    <script>
        class WorkoutTimer {
            constructor() {
                this.ladderPattern = [1, 2, 3, 2];
                this.currentPatternIndex = 0;
                this.totalWorkoutTime = 5 * 60; // seconds
                this.totalTimeRemaining = this.totalWorkoutTime;
                this.currentPhase = 'setup'; // setup, work, rest, complete
                this.currentPhaseTime = 0;
                this.currentWorkDuration = 0;
                this.isPaused = false;
                this.isActive = false;
                this.intervalId = null;
                this.workStartTime = null;
                this.totalRepsCompleted = 0;
                this.currentSetReps = 0;
                
                // Audio settings
                this.audioEnabled = {
                    phaseTransitions: true,
                    workoutComplete: true
                };
                
                this.setupAudio();
            }
            
            setupAudio() {
                // Create audio context for beeps
                this.audioContext = null;
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.log('Audio not supported');
                }
            }
            
            playBeep(frequency = 800, duration = 200, type = 'single') {
                if (!this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration / 1000);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + duration / 1000);
                
                if (type === 'double') {
                    setTimeout(() => this.playBeep(frequency, duration), duration + 50);
                } else if (type === 'triple') {
                    setTimeout(() => this.playBeep(frequency, duration), duration + 50);
                    setTimeout(() => this.playBeep(frequency, duration), (duration + 50) * 2);
                }
            }
            
            start() {
                const duration = parseInt(document.getElementById('workoutDuration').value);
                this.totalWorkoutTime = duration * 60;
                this.totalTimeRemaining = this.totalWorkoutTime;
                
                // Get audio preferences
                this.audioEnabled.phaseTransitions = document.getElementById('phaseTransitions').checked;
                this.audioEnabled.workoutComplete = document.getElementById('workoutComplete').checked;
                
                this.currentPhase = 'work';
                this.currentPatternIndex = 0;
                this.currentPhaseTime = 0;
                this.isActive = true;
                this.isPaused = false;
                this.totalRepsCompleted = 0;
                this.currentSetReps = this.ladderPattern[0];
                
                document.getElementById('setupScreen').classList.add('hidden');
                document.getElementById('workoutScreen').classList.remove('hidden');
                
                this.updateDisplay();
                this.startTimer();
                
                if (this.audioEnabled.phaseTransitions) {
                    this.playBeep(600, 200, 'single');
                }
            }
            
            startTimer() {
                this.intervalId = setInterval(() => {
                    if (!this.isPaused && this.isActive) {
                        this.tick();
                    }
                }, 100);
            }
            
            tick() {
                this.currentPhaseTime += 0.1;
                this.totalTimeRemaining -= 0.1;
                
                // Check if workout is complete
                if (this.totalTimeRemaining <= 0) {
                    this.completeWorkout();
                    return;
                }
                
                this.updateDisplay();
            }
            
            completeReps() {
                if (this.currentPhase !== 'work') return;
                
                // Add current set reps to total
                this.totalRepsCompleted += this.currentSetReps;
                
                this.currentWorkDuration = this.currentPhaseTime;
                this.currentPhase = 'rest';
                this.currentPhaseTime = 0;
                
                if (this.audioEnabled.phaseTransitions) {
                    this.playBeep(500, 200, 'double');
                }
                
                this.updateDisplay();
            }
            
            completeRest() {
                this.currentPatternIndex = (this.currentPatternIndex + 1) % this.ladderPattern.length;
                this.currentPhase = 'work';
                this.currentPhaseTime = 0;
                this.currentSetReps = this.ladderPattern[this.currentPatternIndex];
                
                if (this.audioEnabled.phaseTransitions) {
                    this.playBeep(600, 200, 'single');
                }
                
                this.updateDisplay();
            }
            
            togglePause() {
                this.isPaused = !this.isPaused;
                const pauseBtn = document.getElementById('pauseBtn');
                pauseBtn.textContent = this.isPaused ? 'Resume' : 'Pause';
                pauseBtn.className = this.isPaused ? 'btn btn-success' : 'btn btn-warning';
            }
            
            stop() {
                this.isActive = false;
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                }
                
                document.getElementById('setupScreen').classList.remove('hidden');
                document.getElementById('workoutScreen').classList.add('hidden');
                
                // Reset pause button
                const pauseBtn = document.getElementById('pauseBtn');
                if (pauseBtn) {
                    pauseBtn.textContent = 'Pause';
                    pauseBtn.className = 'btn btn-warning';
                }
            }
            
            completeWorkout() {
                this.isActive = false;
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                }
                
                if (this.audioEnabled.workoutComplete) {
                    this.playBeep(800, 300, 'triple');
                }
                
                this.showWorkoutSummary();
            }
            
            showWorkoutSummary() {
                const workoutScreen = document.getElementById('workoutScreen');
                const elapsedSeconds = this.totalWorkoutTime - this.totalTimeRemaining;
                const elapsedMinutesDisplay = Math.floor(elapsedSeconds / 60);
                const elapsedMinutesForAvg = Math.max(elapsedSeconds / 60, 1 / 60);
                
                workoutScreen.innerHTML = `
                    <div class="workout-summary">
                        <div class="summary-title">🎉 WORKOUT COMPLETE! 🎉</div>
                        <div class="total-reps-highlight">Total Reps: ${this.totalRepsCompleted}</div>
                        <div class="summary-stat">Workout Duration: ${elapsedMinutesDisplay} minutes</div>
                        <div class="summary-stat">Average Reps/Minute: ${Math.round(this.totalRepsCompleted / elapsedMinutesForAvg)}</div>
                        <div style="margin-top: 20px;">
                            <button class="btn btn-primary" onclick="timer.stop()">New Workout</button>
                        </div>
                    </div>
                `;
            }
            
            updateDisplay() {
                const phaseIndicator = document.getElementById('phaseIndicator');
                const repCount = document.getElementById('repCount');
                const timerDisplay = document.getElementById('timerDisplay');
                const totalTimeDisplay = document.getElementById('totalTimeRemaining');
                const progressFill = document.getElementById('progressFill');
                const completeBtn = document.getElementById('completeBtn');
                
                // Update rep count and current set info
                repCount.textContent = this.ladderPattern[this.currentPatternIndex];
                document.getElementById('currentReps').textContent = this.currentSetReps || this.ladderPattern[this.currentPatternIndex];
                document.getElementById('totalRepsCompleted').textContent = this.totalRepsCompleted;
                
                // Update phase indicator
                if (this.currentPhase === 'work') {
                    phaseIndicator.textContent = 'WORK';
                    phaseIndicator.className = 'phase-indicator phase-work';
                    completeBtn.classList.remove('btn-complete-inactive');
                } else if (this.currentPhase === 'rest') {
                    phaseIndicator.textContent = 'REST';
                    phaseIndicator.className = 'phase-indicator phase-rest';
                    completeBtn.classList.add('btn-complete-inactive');
                    
                    // Auto-complete rest when time is up
                    if (this.currentPhaseTime >= this.currentWorkDuration) {
                        this.completeRest();
                        return;
                    }
                }
                
                // Update current phase timer
                let displayTime;
                if (this.currentPhase === 'work') {
                    displayTime = this.currentPhaseTime;
                } else if (this.currentPhase === 'rest') {
                    displayTime = this.currentWorkDuration - this.currentPhaseTime;
                    if (displayTime < 0) displayTime = 0;
                }
                
                const minutes = Math.floor(displayTime / 60);
                const seconds = Math.floor(displayTime % 60);
                timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                // Update total time remaining
                const totalMinutes = Math.floor(this.totalTimeRemaining / 60);
                const totalSeconds = Math.floor(this.totalTimeRemaining % 60);
                totalTimeDisplay.textContent = `${totalMinutes}:${totalSeconds.toString().padStart(2, '0')}`;
                
                // Update progress bar
                const progress = ((this.totalWorkoutTime - this.totalTimeRemaining) / this.totalWorkoutTime) * 100;
                progressFill.style.width = `${progress}%`;
            }
        }
        
        let timer = new WorkoutTimer();
        let stopConfirmAutoPaused = false;
        const workoutScreenTemplate = document.getElementById('workoutScreen').innerHTML;
        
        function matchDurationInputWidthToLabel() {
            const label = document.querySelector('label[for="workoutDuration"]');
            const input = document.getElementById('workoutDuration');
            if (!label || !input) return;
            
            const probe = document.createElement('span');
            const labelStyle = window.getComputedStyle(label);
            probe.style.font = labelStyle.font;
            probe.style.fontWeight = labelStyle.fontWeight;
            probe.style.fontSize = labelStyle.fontSize;
            probe.style.letterSpacing = labelStyle.letterSpacing;
            probe.style.whiteSpace = 'nowrap';
            probe.style.position = 'absolute';
            probe.style.visibility = 'hidden';
            probe.textContent = label.textContent;
            document.body.appendChild(probe);
            input.style.width = probe.offsetWidth + 'px';
            document.body.removeChild(probe);
        }
        matchDurationInputWidthToLabel();
        
        function startWorkout() {
            document.getElementById('workoutScreen').innerHTML = workoutScreenTemplate;
            timer = new WorkoutTimer();
            timer.start();
            stopConfirmAutoPaused = false;
            document.getElementById('stopConfirmControls').classList.add('hidden');
            document.getElementById('normalControls').classList.remove('hidden');
        }
        
        function completeReps() {
            timer.completeReps();
        }
        
        function togglePause() {
            timer.togglePause();
        }
        
        function confirmStop() {
            if (!timer.isPaused) {
                timer.isPaused = true;
                stopConfirmAutoPaused = true;
            }
            document.getElementById('normalControls').classList.add('hidden');
            document.getElementById('stopConfirmControls').classList.remove('hidden');
        }
        
        function cancelStop() {
            if (stopConfirmAutoPaused) {
                timer.isPaused = false;
                stopConfirmAutoPaused = false;
            }
            document.getElementById('stopConfirmControls').classList.add('hidden');
            document.getElementById('normalControls').classList.remove('hidden');
        }
        
        function stopWorkout() {
            stopConfirmAutoPaused = false;
            timer.completeWorkout();
        }
    </script>
</body>
</html>
